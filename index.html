<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>މުޢާޒްގެ ވެބްސައިޓް</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thaana&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Noto Sans Thaana', sans-serif; background-color: #f4f7f6; color: #333; }
        
        /* Header */
        header { background: #00796b; color: white; padding: 20px; text-align: center; }
        
        .main-container { display: flex; padding: 20px; gap: 20px; }
        .content { flex: 3; }
        .sidebar { flex: 1; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Team/People Section */
        .team-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .team-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .team-card img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }

        .welcome-title { color: #00796b; }
        .sidebar li { list-style: none; margin: 10px 0; }
        .sidebar a { text-decoration: none; color: #00796b; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>ވެލްކަމް ޓު މުޢާޒް އެމްވީ</h1>
</header>

<div class="main-container">
    <div class="content">
        <h2 class="welcome-title">އަހަރެމެންގެ ޓީމް</h2>
        <div class="team-section">
            <div class="team-card">
                <img src="https://via.placeholder.com/120" alt="މީހާ">
                <h3>މުޢާޒް</h3>
                <p>ވެބްސައިޓް އެޑްމިން</p>
            </div>
            <div class="team-card">
                <img src="https://via.placeholder.com/120" alt="މީހާ">
                <h3>އެހެން މީހަކު</h3>
                <p>ކޮންޓެންޓް ރައިޓަރ</p>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <h2>މެނިއު</h2>
        <ul>
            <li><a href="#">ފުރަތަމަ ޞަފްޙާ</a></li>
            <li><a href="#">ޚަބަރުތައް</a></li>
            <li><a href="#">ކުރު ވާހަކަ</a></li>
        </ul>
    </div>
</div>

</body>
</html>
