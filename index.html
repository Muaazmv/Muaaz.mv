<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>މުޢާޒްގެ ވެބްސައިޓް</title>
    <style>
        /* ވެބްސައިޓްގެ މައިގަނޑު ޑިޒައިން */
        body { 
            font-family: 'Arial', sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 0; 
            background-color: #f0f2f5; 
            color: #333;
        }
        
        /* ހެޑަރ (Header) ގެ ކުލަ */
        header { 
            background: #2c3e50; 
            color: #ffffff; 
            padding: 2rem; 
            text-align: center; 
            border-bottom: 5px solid #3498db;
        }

        /* ޚަބަރުތައް ހުންނަ ބައި (Cards) */
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .news-card { 
            background: #ffffff; 
            margin: 20px 0; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            border-right: 5px solid #3498db;
        }

        h2 { color: #2c3e50; margin-top: 0; }
        
        /* ލިންކް ނުވަތަ ބަޓަން ސްޓައިލް */
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>މުޢާޒްގެ ރަސްމީ ވެބްސައިޓް</h1>
</header>

<div class="container">
    <section class="news-card">
        <h2>ފަހުގެ ޚަބަރު</h2>
        <p>މިއީ މުޢާޒްގެ ވެބްސައިޓްގެ ފުރަތަމަ ޚަބަރެވެ. މި ޑިޒައިންގައި ކުލަތައް ހުރީ ލޮލަށް ފަސޭހަ ގޮތަކަށެވެ.</p>
        <a href="#" class="btn">އިތުރަށް ބައްލަވާ</a>
    </section>

    <section class="news-card">
        <h2>އިތުރު ޚަބަރު</h2>
        <p>މިތަނުގައި މުޢާޒް ބޭނުންވާ އިތުރު ޚަބަރުތައް ލިޔެ، ރީތިކޮށް ދައްކާލެވޭނެއެވެ.</p>
    </section>
</div>

</body>
</html>
