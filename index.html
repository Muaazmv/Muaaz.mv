    <title>މުއާޒްގެ ވެބްސައިޓް</title>
    <style>
        body { 
            display: flex;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            background-color: #1a1a2e; 
            color: #ffffff;
        }
        
        .content { flex: 3; padding: 60px; }
        
        .sidebar { 
            flex: 1; 
            background-color: #0f3460; 
            padding: 50px; 
            border-right: 5px solid #e94560; 
        }
        
        h1 { font-size: 4em; color: #e94560; } 
        p { font-size: 2em; line-height: 1.8; color: #e0e0e0; }
        
        .sidebar h2 { font-size: 2.5em; color: #f8f8f8; margin-bottom: 40px; }
        
        .sidebar ul { padding: 0; }
        
        .sidebar li { 
            list-style: none;
            margin: 30px 0; 
            background: #1a1a2e;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }
        
        /* ލިންކް ސްޓައިލް */
        .sidebar li a {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.5em;
        }
        
        .sidebar li:hover { background-color: #e94560; }
    </style>
