<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>މުއާޒުގެ ވެބްސައިޓް</title>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; line-height: 1.6; }
        .nav { background: #333; padding: 10px; border-radius: 5px; }
        .nav a { color: white; margin-left: 15px; text-decoration: none; font-weight: bold; }
        .section { margin-top: 30px; padding: 20px; border: 1px solid #eee; border-radius: 5px; }
        h1 { color: #0056b3; }
    </style>
</head>
<body>

    <!-- މެނޫ -->
    <nav class="nav">
        <a href="#vaahaka">ވާހަކަ</a>
        <a href="#khabaru">ޚަބަރު</a>
        <a href="#liyuntah">ލިޔުންތައް</a>
        <a href="#rahrashuge-reethikan">ރަށްރަށުގެ ރީތިކަން</a>
    </nav>

    <!-- ވާހަކަ -->
    <section id="vaahaka" class="section">
        <h1>ވާހަކަ</h1>
        <p>މިތަނުގައި ވާހަކަތައް ލިޔެވޭނެއެވެ.</p>
    </section>

    <!-- ޚަބަރު -->
    <section id="khabaru" class="section">
        <h1>ޚަބަރު</h1>
        <p>މިތަނުގައި ފަހުގެ ޚަބަރުތައް ހިމެނޭނެއެވެ.</p>
    </section>

    <!-- ލިޔުންތައް -->
    <section id="liyuntah" class="section">
        <h1>ލިޔުންތައް</h1>
        <p>މިތަނުގައި ތަފާތު ލިޔުންތައް ހުންނާނެއެވެ.</p>
    </section>

    <!-- ރަށްރަށުގެ ރީތިކަން -->
    <section id="rahrashuge-reethikan" class="section">
        <h1>ރަށްރަށުގެ ރީތިކަން</h1>
        <p>މިތަނުގައި ރާއްޖޭގެ ރަށްރަށުގެ ރީތި ފޮޓޯތަކާއި މަޢުލޫމާތު ހިމެނޭނެއެވެ.</p>
    </section>

</body>
</html>
