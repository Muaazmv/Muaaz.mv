<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* މުޅި ސައިޓުގެ ފޮންޓް */
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: row; min-height: 100vh; }
        
        /* ސައިޑްބަރ */
        .sidebar { width: 300px; background: #1a2a6c; color: white; padding: 20px; }
        .sidebar h2 { border-bottom: 2px solid #fdbb2d; padding-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 12px; background: rgba(255,255,255,0.1); margin: 5px 0; border-radius: 5px; cursor: pointer; }
        .sidebar li:hover { background: rgba(255,255,255,0.3); }
        
        /* ކޮންޓެންޓް */
        .content { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* މޮބައިލް ސްކްރީނަށް ޚާއްސަ ސްޓައިލް */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; box-sizing: border-box; }
            .content { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ފިހުރިސްތު</h2>
        <ul>
            <li>ޚަބަރު</li>
            <li>ވާހަކަ</li>
            <li>ރަށްފުށުގެ ރީތިކަން</li>
            <li>ހާދިސާ</li>
        </ul>
    </div>

    <div class="content">
        <div class="card">
            <h1>މުޢާޒް އެމްވީ އަށް މަރުޙަބާ!</h1>
            <p>މިތަނުން ތިބާ ބޭނުންވާ ބައެއް ޚިޔާރު ކުރައްވާ.</p>
            
            <!-- ޚަބަރުތައް ދައްކާނެ ގޮތް -->
            <div class="news-section">
                <h2>ފަހުގެ ޚަބަރުތައް</h2>
                <div style="border-bottom: 1px solid #ccc; margin-bottom: 15px;">
                    <h3>ފުރަތަމަ ޚަބަރުގެ ސުރުޚީ</h3>
                    <p>މިއީ ޚަބަރުގެ ތަފްސީލު...</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
