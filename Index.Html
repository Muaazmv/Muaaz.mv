<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            font-family: 'Maldivi', 'MV Boli', sans-serif; 
            background-color: #f0f2f5;
        }
        
        .sidebar { 
            width: 25%; 
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            color: white; 
            padding: 30px 20px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar h2 { border-bottom: 2px solid white; padding-bottom: 10px; }
        .sidebar ul { list-style-type: none; padding: 0; }
        .sidebar li { 
            padding: 15px 10px; 
            margin: 5px 0; 
            background: rgba(255,255,255,0.1); 
            border-radius: 5px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .sidebar li:hover { background: rgba(255,255,255,0.3); }
        
        .content { width: 75%; padding: 50px; }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ފިހުރިސްތު</h2>
        <ul>
            <li>ޚަބަރު</li>
            <li>ވާހަކަ</li>
            <li>ރަށްފުށުގެ ރީތިކަން</li>
            <li>ރާއްޖެތެރޭގެ ހިތްފަސޭހަކަން</li>
            <li>ބިރުވެރި ވާހަކަ</li>
            <li>ހާދިސާ</li>
            <li>އެކިއެކި ވާހަކަތައް</li>
        </ul>
    </div>

    <div class="content">
        <div class="card">
            <h1>މުޢާޒް އެމްވީ އަށް މަރުޙަބާ!</h1>
            <p>މިތަނުން ތިބާ ބޭނުންވާ ބައެއް ޚިޔާރު ކުރައްވާ.</p>
        </div>
    </div>

</body>
</html>
